<!DOCTYPE HTML>
<html>
    <head>
        <title>Radio Fantasma WebPlayer</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" id='styleSheet' href="Styles/iphone-style.css">
        <link rel="manifest" href="manifest.json" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    </head>
    <body>
        <div class="pop-up-container" id="pop-up" onclick="document.getElementById('pop-up').style.display = 'none';">
            <div class="pop-up" onclick="event.stopPropagation();">
                <h2 id="pop-up-title">Titulo Mensagem...</h2><br><hr><br>
                <span id="pop-up-content">Mensagem em si...</span>
            </div>
        </div>

        <div class="pop-up-container" id="pop-up-recorder" onclick="document.getElementById('pop-up-recorder').style.display = 'none';">
            <div class="pop-up" onclick="event.stopPropagation();">
                <h2>Começar uma gravação:</h2><br><hr><br>
                <p>Grave a programação da radio para ouvir off-line</p><br>
                <input type="text" id="record-name" placeholder="Nome da gravacao" class="btn btn-primary" style="width: var(--width-for-inputs);"><br><br>
                <input type="text" id="record-description" placeholder="Descricao" class="btn btn-primary" style="width: var(--width-for-inputs);"><br><br>
                <button onclick="startRecording()" class='btn btn-primary' id="button-record" style="width: 100%;">Gravar</button>
                <button onclick="stopRecording()" class='btn btn-primary' id="button-stop" style="width: 100%; display:none;">Parar</button>    
            </div>
        </div>

        <div id='portait-mode'>
            <div class='container'>
                <br>
                <center>
                    <br><br><br><br>
                    <div class="top-buttons">
                        <svg xmlns="http://www.w3.org/2000/svg" onclick="openRecordContainer()" height="24px" viewBox="0 -960 960 960" width="24px" fill="var(--primary-color)"><path d="M158-242q-37-50-57.5-110.5T80-480q0-67 20-127t57-110l58 57q-26 38-40.5 83.5T160-480q0 51 14.5 97t40.5 84l-57 57ZM480-80q-67 0-127-20t-110-57l57-58q38 26 83.5 40.5T480-160q51 0 96.5-14.5T660-215l57 58q-50 37-110 57T480-80Zm322-162-57-57q26-38 40.5-84t14.5-97q0-51-14.5-96.5T745-660l58-57q37 50 57 110t20 127q0 67-20.5 127.5T802-242ZM299-745l-57-57q50-37 110.5-57.5T480-880q68 0 128 20.5T718-802l-57 57q-38-26-84-40.5T480-800q-51 0-97 14.5T299-745Zm181 465q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280Z"/></svg>
                        <svg xmlns="http://www.w3.org/2000/svg" onclick="openSettingsMenu()" class="dots" height="24px" viewBox="0 -960 960 960" width="24px" fill="var(--primary-color)"><path d="M240-400q-33 0-56.5-23.5T160-480q0-33 23.5-56.5T240-560q33 0 56.5 23.5T320-480q0 33-23.5 56.5T240-400Zm240 0q-33 0-56.5-23.5T400-480q0-33 23.5-56.5T480-560q33 0 56.5 23.5T560-480q0 33-23.5 56.5T480-400Zm240 0q-33 0-56.5-23.5T640-480q0-33 23.5-56.5T720-560q33 0 56.5 23.5T800-480q0 33-23.5 56.5T720-400Z"/></svg>
                    </div>
                    <span id="recordWarning" style="color: rgb(255, 92, 92); display: none;">GRAVANDO! Volte para o menu<br> de gravação para parar.<br><br></span>
                    <img src='https://placehold.co/250?text=Aguarde...' id='music-cover' class="music-cover"><br><br>
                    <h3 id='song-name'>[Carregando...]</h3><br><br>
                    <p id='song-artist'>[Ainda ta carregando..]</p><br>
                    <audio id='radio-audio'></audio>
                    <svg xmlns="http://www.w3.org/2000/svg" style='display: none;' id="loading-live" height="24px" viewBox="0 -960 960 960" width="24px" fill="#FFFFFF"><path d="M160-160v-80h110l-16-14q-52-46-73-105t-21-119q0-111 66.5-197.5T400-790v84q-72 26-116 88.5T240-478q0 45 17 87.5t53 78.5l10 10v-98h80v240H160Zm400-10v-84q72-26 116-88.5T720-482q0-45-17-87.5T650-648l-10-10v98h-80v-240h240v80H690l16 14q49 49 71.5 106.5T800-482q0 111-66.5 197.5T560-170Z"/></svg>
                    <button onclick="startPlayer()" class='btn btn-primary' id="button-play-live">Começar a ouvir</button>
                </center>
            </div>
            <nav>
                <a href='#' onclick="errorForTemplate()"><svg class='not-selected' xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="var(--primary-color)"><path d="M200-80q-33 0-56.5-23.5T120-160v-560q0-33 23.5-56.5T200-800h40v-80h80v80h320v-80h80v80h40q33 0 56.5 23.5T840-720v560q0 33-23.5 56.5T760-80H200Zm0-80h560v-400H200v400Zm0-480h560v-80H200v80Zm0 0v-80 80Z"/></svg></a>
                <a href='#' onclick="errorForTemplate()"><svg class='not-selected' xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="var(--primary-color)"><path d="M500-360q42 0 71-29t29-71v-220h120v-80H560v220q-13-10-28-15t-32-5q-42 0-71 29t-29 71q0 42 29 71t71 29ZM320-240q-33 0-56.5-23.5T240-320v-480q0-33 23.5-56.5T320-880h480q33 0 56.5 23.5T880-800v480q0 33-23.5 56.5T800-240H320Zm0-80h480v-480H320v480ZM160-80q-33 0-56.5-23.5T80-160v-560h80v560h560v80H160Zm160-720v480-480Z"/></svg></a>
            </nav>
        </div>
        <div id='horizontal-mode'>
            <center><canvas id='visualizer'></canvas></center>
            <div class='nav-horizontal'>
                <img src='https://placehold.co/250?text=Aguarde...' id='music-cover-horizontal' style='width: 48px; height: 48px'>
                <span>
                    <span id='song-name-horizontal'>Carregando...</span>&nbsp;-&nbsp;
                    <span id='song-artist-horizontal'>Ainda esta...</span>
                </span>
                <svg xmlns="http://www.w3.org/2000/svg" style='display: none;' id="loading-live-side" height="24px" viewBox="0 -960 960 960" width="24px" fill="var(--primary-color)"><path d="M160-160v-80h110l-16-14q-52-46-73-105t-21-119q0-111 66.5-197.5T400-790v84q-72 26-116 88.5T240-478q0 45 17 87.5t53 78.5l10 10v-98h80v240H160Zm400-10v-84q72-26 116-88.5T720-482q0-45-17-87.5T650-648l-10-10v98h-80v-240h240v80H690l16 14q49 49 71.5 106.5T800-482q0 111-66.5 197.5T560-170Z"/></svg>
                <svg xmlns="http://www.w3.org/2000/svg" id="button-play-live-side" onclick="startPlayer()" height="48px" viewBox="0 -960 960 960" width="40px" fill="var(--primary-color)"><path d="M382-306.67 653.33-480 382-653.33v346.66ZM480-80q-82.33 0-155.33-31.5-73-31.5-127.34-85.83Q143-251.67 111.5-324.67T80-480q0-83 31.5-156t85.83-127q54.34-54 127.34-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 82.33-31.5 155.33-31.5 73-85.5 127.34Q709-143 636-111.5T480-80Zm0-66.67q139.33 0 236.33-97.33t97-236q0-139.33-97-236.33t-236.33-97q-138.67 0-236 97-97.33 97-97.33 236.33 0 138.67 97.33 236 97.33 97.33 236 97.33ZM480-480Z"/></svg>
            </div>
        </div>
        <script src='swiped-events.js'></script>
        <script src='efeitosVisualizer.js'></script>
        <script src='index-script.js'></script>
        <script src='MRF/logicRecording.js'></script>
        <script src='MRF/createMRF.js'></script>
        <script src='MRF/loadMRF.js'></script>
        <img src='https://i.redd.it/p8gguk2uw8t61.gif' style='display: none;' id='scott-gif'>
        <script>
            let numero = Number(window.localStorage.getItem("themeCode"));
            switch(numero){
                case 1:
                    document.getElementById("styleSheet").href = "Styles/style.css";
                    break;

                case 2:
                    document.getElementById("styleSheet").href = "Styles/iphone-style.css";
                    break;
            }
        </script>
    </body>
</html>
